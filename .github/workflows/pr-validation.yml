name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-slim
    
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run Biome checks
      run: npm run check
    
    - name: Run tests with coverage
      run: npm run test:coverage
        
    - name: Check build
      run: npm run build
    
    - name: Check for uncommitted changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "Uncommitted changes found. Please commit all changes."
          git status --porcelain
          exit 1
        fi

    - name: Check version bump
      run: |
        git fetch origin main
        CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
        if echo "$CHANGED_FILES" | grep -qv '^.github/workflows/'; then
          REQUIRE_VERSION_BUMP=true
        else
          REQUIRE_VERSION_BUMP=false
        fi

        if [ "$REQUIRE_VERSION_BUMP" = "false" ]; then
          echo "Workflow-only changes detected. Skipping version bump check."
          exit 0
        fi

        PR_VERSION=$(node -p "require('./package.json').version")
        BASE_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
        if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
          echo "::error::Version in package.json ($PR_VERSION) has not been bumped. Each PR must include a version update."
          exit 1
        fi
        echo "Version bumped: $BASE_VERSION -> $PR_VERSION"
