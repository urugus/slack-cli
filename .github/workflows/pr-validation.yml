name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check code formatting
      run: npm run format:check
    
    - name: Run linter
      run: npm run lint
    
    - name: Run tests with coverage
      run: npm run test:coverage
        
    - name: Check build
      run: npm run build
    
    - name: Check for uncommitted changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "Uncommitted changes found. Please commit all changes."
          git status --porcelain
          exit 1
        fi

    - name: Check version bump
      run: |
        PR_VERSION=$(node -p "require('./package.json').version")
        git fetch origin main
        BASE_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
        if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
          echo "::error::Version in package.json ($PR_VERSION) has not been bumped. Each PR must include a version update."
          exit 1
        fi
        echo "Version bumped: $BASE_VERSION -> $PR_VERSION"