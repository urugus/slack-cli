name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-slim
    
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run Biome checks
      run: npm run check
    
    - name: Run tests with coverage
      run: npm run test:coverage
        
    - name: Check build
      run: npm run build
    
    - name: Check for uncommitted changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "Uncommitted changes found. Please commit all changes."
          git status --porcelain
          exit 1
        fi

    - name: Check version bump
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
        CHANGED_FILES=$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA")
        echo "Changed files:"
        echo "$CHANGED_FILES"

        if [ -z "$CHANGED_FILES" ]; then
          echo "No changed files detected. Skipping version bump check."
          exit 0
        fi

        if ! echo "$CHANGED_FILES" | grep -Eqv '^(\.github/workflows/.*|package-lock\.json|package\.json)$'; then
          if ! echo "$CHANGED_FILES" | grep -qx 'package\.json'; then
            echo "Workflow-only or lockfile-only changes detected. Skipping version bump check."
            exit 0
          fi

          if node -e "const fs = require('node:fs'); const { execSync } = require('node:child_process'); const baseSha = process.env.BASE_SHA; const headPackage = JSON.parse(fs.readFileSync('package.json', 'utf8')); const basePackage = JSON.parse(execSync('git show ' + baseSha + ':package.json', { encoding: 'utf8' })); const stripDependencyFields = (pkg) => { const cloned = JSON.parse(JSON.stringify(pkg)); delete cloned.version; delete cloned.dependencies; delete cloned.devDependencies; delete cloned.peerDependencies; delete cloned.optionalDependencies; delete cloned.overrides; return cloned; }; process.exit(JSON.stringify(stripDependencyFields(headPackage)) === JSON.stringify(stripDependencyFields(basePackage)) ? 0 : 1);"
          then
            echo "Dependency-manifest-only changes detected. Skipping version bump check."
            exit 0
          fi
        fi

        PR_VERSION=$(node -p "require('./package.json').version")
        BASE_VERSION=$(git show "$BASE_SHA":package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
        if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
          echo "::error::Version in package.json ($PR_VERSION) has not been bumped. Each PR must include a version update unless it only changes workflows or dependency manifests."
          exit 1
        fi
        echo "Version bumped: $BASE_VERSION -> $PR_VERSION"
