name: Supply Chain Security Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  supply-chain-check:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-slim

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get base branch package.json
      id: base-pkg
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        git show "$BASE_SHA":package.json > /tmp/base-package.json

    - name: Run supply chain security check
      id: check
      run: |
        BASE_PKG=$(cat /tmp/base-package.json)
        npx tsx scripts/supply-chain-check-runner.ts "$BASE_PKG" > /tmp/supply-chain-report.md

    - name: Claude supply chain analysis
      uses: anthropics/claude-code-action@88c168b39e7e64da0286d812b6e9fbebb6708185 # v1.0.82
      with:
        claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        use_sticky_comment: true
        direct_prompt: |
          You are a supply chain security analyst. Read the supply chain security check report
          generated by our automated tool, and post a concise analysis as a PR comment.

          First, read the report at /tmp/supply-chain-report.md.

          Then analyze the results and write a PR comment in English that includes:
          1. A summary header with ✅ (all clear) or ⚠️ (issues found)
          2. A table of dependency changes (added/updated/removed) if any
          3. Risk signals for each flagged package with severity indicators
          4. npm audit vulnerability findings if any
          5. An actionable recommendation section

          Keep the comment concise and focused on actionable insights.
          Use markdown formatting for readability.

          IMPORTANT: Your analysis should be in English.
        allowed_bots: 'dependabot[bot],claude[bot]'
        claude_args: '--allowedTools Read,Bash(cat:*)'
