name: Claude PR Auto-Fix

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-pr-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    # Trigger on review with changes_requested, or on individual review comments
    # Skip if the comment/review is from a bot (prevent infinite loops)
    if: >
      (
        (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested') ||
        (github.event_name == 'pull_request_review_comment')
      ) &&
      !endsWith(github.event.sender.login, '[bot]')
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix review comments
        uses: anthropics/claude-code-action@88c168b39e7e64da0286d812b6e9fbebb6708185 # v1.0.82
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            PR #${{ github.event.pull_request.number }} にレビューコメントが投稿されました。
            修正を行い、プッシュしてください。

            まず以下のコマンドでレビューコメントを確認してください:
            gh pr view ${{ github.event.pull_request.number }} --comments
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments

            修正手順:
            1. レビューコメントの内容を理解する
            2. 指摘事項に対応するコードを修正する
            3. npm test / npm run check / npm run build を実行
            4. すべてパスしたらコミット & プッシュ
            5. 対応したレビューコメントにリプライで修正内容を報告する

            注意:
            - CLAUDE.md の開発方針に従うこと
            - テストが壊れる変更はプッシュしないこと
            - コメントは日本語で書くこと
