name: Claude Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    if: >
      !contains(github.event.issue.title, '[dependabot]') &&
      github.event.issue.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analyze and Refine Issue
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            新しい Issue を分析し、要件を整理してください。

            Issue #${{ github.event.issue.number }}
            タイトル: ${{ github.event.issue.title }}
            内容: ${{ github.event.issue.body }}

            以下を実行してください:
            1. CLAUDE.md を読み、プロジェクトの開発方針を把握する
            2. コードベースを調査し、影響範囲を特定する
            3. Issue にコメントを投稿する:
               - 要件の理解内容
               - 影響するファイル・モジュール
               - 不明点・確認事項（あれば）
               - TDD での実装アプローチ案
            4. "needs-refinement" ラベルを付与する

            コメントは日本語で書くこと。
