name: Claude Issue Validation

on:
  issues:
    types: [opened, edited, reopened]

jobs:
  validate-issue:
    if: >
      !contains(github.event.issue.title, '[dependabot]') &&
      github.event.issue.user.login != 'dependabot[bot]' &&
      !contains(join(github.event.issue.labels.*.name, ','), 'in-progress') &&
      !contains(join(github.event.issue.labels.*.name, ','), 'implemented')
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure approved label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "approved" --color "0e8a16" --description "Issue is valid and ready for implementation" || true

      - name: Validate Issue
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            新しい Issue の妥当性を判定してください。

            Issue #${{ github.event.issue.number }}
            タイトル: ${{ github.event.issue.title }}
            内容: ${{ github.event.issue.body }}

            以下を実行してください:
            1. CLAUDE.md を読み、プロジェクト方針に照らして Issue の妥当性を評価する
            2. 要件の明確さ、実装可能性、スコープの適切さを判定する
            3. 判定結果を Issue に日本語でコメントする（必須）

            コメントには必ず以下を含めること:
            - 判定結果（OK / NG）
            - 判定理由（2-4点）
            - 必要なら不足情報や修正提案

            追加ルール:
            - 判定が OK の場合のみ "approved" ラベルを付与する
            - 判定が NG の場合は "approved" ラベルが付いていれば削除する
