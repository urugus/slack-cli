name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect workflow changes
        id: changed-files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          if git diff --name-only "$MERGE_BASE" "$HEAD_SHA" | grep -q '^\.github/workflows/'; then
            echo "workflow_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Claude Code Review for workflow changes
        if: steps.changed-files.outputs.workflow_changes == 'true'
        run: echo "Workflow changes detected. Skipping Claude Code Review to avoid GitHub App workflow validation failure."

      - name: Run Claude Code Review
        if: steps.changed-files.outputs.workflow_changes != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1.0.111
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          allowed_bots: 'dependabot[bot],claude[bot]'
          # Keep a single visible PR comment updated so successful reviews are still observable
          # even when there are no new inline findings.
          use_sticky_comment: true
          display_report: true
          show_full_output: true
          claude_args: '--allowedTools Read,Glob,Grep,Bash(gh:*),Bash(git:*)'
